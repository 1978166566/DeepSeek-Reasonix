<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reasonix Chrome Bridge</title>
  <style>
    body { width: 300px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .status { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; margin-bottom: 12px; }
    .connected { background: #d4edda; color: #155724; }
    .disconnected { background: #f8d7da; color: #721c24; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-green { background: #28a745; }
    .dot-red { background: #dc3545; }
    h2 { margin: 0 0 12px 0; font-size: 16px; }
    label { display: block; font-size: 12px; margin-bottom: 4px; color: #666; }
    input { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #007bff; color: white; }
    .btn-primary:hover { background: #0056b3; }
    .btn-secondary { background: #6c757d; color: white; margin-top: 4px; }
    .btn-secondary:hover { background: #5a6268; }
    .info { font-size: 11px; color: #666; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <h2>🦊 Reasonix Bridge</h2>
  <div id="status" class="status disconnected">
    <span class="dot dot-red"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <label for="wsUrl">WebSocket URL</label>
  <input type="text" id="wsUrl" value="ws://127.0.0.1:18889" placeholder="ws://127.0.0.1:18889">

  <button class="btn-primary" id="connectBtn">Connect</button>
  <button class="btn-secondary" id="reconnectBtn">Force Reconnect</button>

  <div class="info">
    <p id="activeTab">Active tab: --</p>
    <p id="extVersion">Version 1.0.0</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
